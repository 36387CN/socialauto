services:
  - type: web
    name: socialauto
    env: node
    region: singapore
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"
      - key: DB_PATH
        value: /tmp/socialauto.db
